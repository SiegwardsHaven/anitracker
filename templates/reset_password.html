<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password · AniTracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=5">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-brand">Ani<span>Tracker</span></div>
      <h1>Reset Password</h1>
      <p class="auth-subtitle">Enter your new password</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('reset_password', token=token) }}" class="auth-form">
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" name="password" required
                 placeholder="At least 8 characters" autocomplete="new-password"
                 minlength="8">
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm New Password</label>
          <input type="password" id="confirm_password" name="confirm_password" required
                 placeholder="Re-enter password" autocomplete="new-password"
                 minlength="8">
        </div>

        <button type="submit" class="btn primary block">Reset Password</button>
      </form>

      <div class="auth-footer">
        <a href="{{ url_for('login') }}">Back to login</a>
      </div>
    </div>
    <p class="auth-copyright">&copy; 2026 NeoByte Labs</p>
  </div>
</body>
</html>
